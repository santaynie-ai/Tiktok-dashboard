name: TikTok Category Worker

on:
  schedule:
    - cron: '0 */6 * * *' # Jalan setiap 6 jam
  workflow_dispatch: # Bisa dijalankan manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_API_URL: ${{ secrets.WA_API_URL }}
          WA_INSTANCE_ID: ${{ secrets.WA_INSTANCE_ID }}
          WA_API_TOKEN: ${{ secrets.WA_API_TOKEN }}
          WA_GROUP_ID: ${{ secrets.WA_GROUP_ID }}
        run: python scraper/main.py
